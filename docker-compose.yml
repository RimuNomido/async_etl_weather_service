version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    
    networks:
      - app-network
    
  cli:
    build: .
    entrypoint: /entrypoint.sh
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - WEATHER_MAP_API=${WEATHER_MAP_API}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - .:/app
    stdin_open: true
    tty: true

    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge